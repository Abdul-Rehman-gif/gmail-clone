<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gmail Clone</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { display: flex; flex-direction: column; height: 100vh; background-color: #f6f8fc; font-family: sans-serif; }
        .app-body { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 250px; background-color: #f6f8fc; padding: 20px; }
        .main-content { flex: 1; background: white; border-radius: 16px; overflow: hidden; display: flex; flex-direction: column; }
        .email-list { flex: 1; overflow-y: auto; }
        .email-item { display: flex; padding: 15px; border-bottom: 1px solid #f1f3f4; cursor: pointer; align-items: center; }
        .sender { width: 150px; font-weight: bold; }
        .subject-wrapper { flex: 1; overflow: hidden; }
        .snippet { color: #5f6368; font-size: 13px; margin-left: 8px; }

        /* Responsive Mobile Layout */
        @media (max-width: 768px) {
            .app-body { flex-direction: column; }
            .sidebar { width: 100%; height: auto; }
        }
    </style>
</head>
<body>

<div class="app-body">
    <div class="sidebar">
        <button onclick="switchFolder('inbox')">Inbox</button>
    </div>
    <div class="main-content">
        <div class="email-list" id="emailList"></div>
    </div>
</div>

<script>
    let cachedEmails = [];

    async function fetchFolderData() {
        try {
            const response = await fetch(`/api/inbox?folder=inbox`);
            const data = await response.json();
            if (data.status === "success") {
                cachedEmails = data.emails;
                renderList(cachedEmails);
            }
        } catch (err) { console.error("Error fetching data:", err); }
    }

    function renderList(list) {
        const el = document.getElementById('emailList');
        // This ensures if body is empty, we show a placeholder
        el.innerHTML = list.map(email => `
            <div class="email-item" onclick="toggleEmailRow(${email.id})">
                <div class="sender">${email.sender}</div>
                <div class="subject-wrapper">
                    <span class="subject">${email.subject || '(No Subject)'}</span>
                    <span class="snippet" id="snip-${email.id}">
                        — ${email.body ? email.body : 'Click to view message...'}
                    </span>
                </div>
            </div>
        `).join('');
    }

    async function toggleEmailRow(mailId) {
        const snippetElement = document.getElementById(`snip-${mailId}`);
        if (!snippetElement) return;

        // Fetch the full body on-demand if it wasn't in the initial list
        try {
            const response = await fetch(`/api/body?id=${mailId}&folder=inbox`);
            const data = await response.json();
            if (data.status === "success") {
                snippetElement.textContent = data.body;
            }
        } catch (err) { console.error("Failed to load body:", err); }
    }

    fetchFolderData();
</script>
</body>
</html>
