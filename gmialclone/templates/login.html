<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in - Gmail Clone</title>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Roboto', sans-serif; background-color: #f0f4f9; display: flex; align-items: center; justify-content: center; height: 100vh; color: #1f1f1f; }
        .login-card { background: white; width: 450px; border-radius: 28px; padding: 40px; box-shadow: 0 4px 24px rgba(0,0,0,0.05); display: flex; flex-direction: column; }
        .logo-container { display: flex; justify-content: center; margin-bottom: 24px; }
        .logo-container img { height: 32px; }
        h1 { font-family: 'Google Sans', sans-serif; font-size: 24px; font-weight: 400; text-align: center; margin-bottom: 8px; color: #1f1f1f; }
        p.subtitle { text-align: center; font-size: 16px; color: #444746; margin-bottom: 32px; }
        .input-group { position: relative; margin-bottom: 20px; }
        .input-group input { width: 100%; padding: 16px; border: 1px solid #747775; border-radius: 4px; font-size: 16px; outline: none; background: transparent; transition: border-color 0.2s; }
        .input-group input:focus { border-color: #0b57d0; border-width: 2px; padding: 15px; }
        .error-banner { color: #b3261e; font-size: 12px; margin-top: -12px; margin-bottom: 16px; display: none; }
        .footer-actions { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; }
        .info-link { color: #0b57d0; text-decoration: none; font-size: 14px; font-weight: 500; }
        .info-link:hover { text-decoration: underline; }
        .submit-btn { background-color: #0b57d0; color: white; border: none; padding: 10px 24px; border-radius: 100px; font-family: 'Google Sans', sans-serif; font-weight: 500; font-size: 14px; cursor: pointer; transition: background-color 0.2s; }
        .submit-btn:hover { background-color: #0b4aae; }
        .submit-btn:disabled { background-color: #1f1f1f1f; color: #1f1f1f61; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="login-card">
    <div class="logo-container">
        <img src="https://ssl.gstatic.com/ui/v1/icons/mail/rfr/logo_gmail_lockup_default_1x_r5.png" alt="Gmail logo">
    </div>
    <h1>Sign in</h1>
    <p class="subtitle">to continue to Gmail Client Sandbox</p>
    
    <div class="input-group">
        <input type="email" id="userEmail" placeholder="Email address" required>
    </div>
    
    <div class="input-group">
        <input type="password" id="appPassword" placeholder="Google App Password" required>
    </div>
    
    <div class="error-banner" id="errorMsg">Invalid credentials. Check your app password settings.</div>
    
    <div class="footer-actions">
        <a class="info-link" href="https://myaccount.google.com/apppasswords" target="_blank">Get App Password</a>
        <button class="submit-btn" id="loginBtn" onclick="executeLogin()">Next</button>
    </div>
</div>

<script>
async function executeLogin() {
    const email = document.getElementById('userEmail').value.trim();
    const password = document.getElementById('appPassword').value.trim();
    const btn = document.getElementById('loginBtn');
    const err = document.getElementById('errorMsg');
    
    if(!email || !password) return;
    
    btn.disabled = true;
    btn.textContent = "Verifying...";
    err.style.display = "none";
    
    try {
        const response = await fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        });
        const data = await response.json();
        if(response.ok && data.status === "success") {
            window.location.reload(); 
        } else {
            err.textContent = data.message || "Login verification failed.";
            err.style.display = "block";
            btn.disabled = false;
            btn.textContent = "Next";
        }
    } catch(e) {
        err.textContent = "Network communication breakdown occurred.";
        err.style.display = "block";
        btn.disabled = false;
        btn.textContent = "Next";
    }
}
</script>
</body>
</html>
